<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeppa.nu | Öppnar Februari 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Stilrena fonter -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    
    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            /* DARK MODE (The Void) */
            --bg-color: #050608;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --chalk-line: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(10, 10, 10, 0.4);
            --glass-blur: 20px;
            --accent: #38BDF8; /* Sky Blue */
            --btn-bg: #FFFFFF;
            --btn-text: #050608;
            --nebula-opacity: 0.3;
            --error-color: #ef4444;
            --success-color: #22c55e;
        }

        /* LIGHT MODE (The Blueprint) */
        body.light-theme {
            --bg-color: #FAFAFA;
            --text-primary: #171717;
            --text-secondary: #525252;
            --chalk-line: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-blur: 20px;
            --accent: #0284C7;
            --btn-bg: #171717; 
            --btn-text: #FFFFFF;
            --nebula-opacity: 0;
        }

        /* Grundinställningar */
        html {
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
        }

        body {
            background-color: transparent;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            transition: color 0.5s ease;
            font-weight: 300;
        }

        /* BAKGRUNDS-LAGER */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            z-index: -10;
        }

        /* Brus-textur */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: -1;
        }

        /* Nebula Glow */
        .nebula-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vh;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, rgba(0,0,0,0) 60%);
            opacity: var(--nebula-opacity);
            transition: opacity 0.5s ease;
            z-index: -4;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Blueprint Grid */
        .blueprint-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -4;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        body.light-theme .blueprint-grid { opacity: 1; }

        h1 { font-family: 'DM Serif Display', serif; }

        /* PANEL */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--chalk-line);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: 2px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* BUTTON */
        .btn-submit {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--btn-bg);
            border-radius: 2px;
            font-weight: 600; /* Lite fetare för versalerna */
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.05em; /* Lite extra spacing för versaler */
            text-transform: uppercase;
        }
        .btn-submit:not(:disabled):hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Input styling */
        input#email {
            border: 1px solid var(--chalk-line);
            border-radius: 2px;
            font-weight: 300;
            transition: border-color 0.3s ease;
        }
        input#email:focus {
            border-color: var(--accent);
        }

        /* FORM FEEDBACK */
        .status-message {
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.01em;
        }
        .status-error { color: var(--error-color); }
        .status-success { color: var(--success-color); }

        /* Starfall */
        canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -5;
            transition: opacity 0.5s ease;
        }
        body.light-theme canvas { opacity: 0; }

        /* THEME SWITCH */
        .theme-switch { --toggle-size: 10px; --container-width: 5.625em; --container-height: 2.5em; --container-radius: 6.25em; --container-light-bg: #E2E8F0; --container-night-bg: #1D1F2C; --circle-container-diameter: 3.375em; --sun-moon-diameter: 2.125em; --sun-bg: #ECCA2F; --moon-bg: #C4C9D1; --spot-color: #959DB1; --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1); --stars-color: #fff; --clouds-color: #F3FDFF; --back-clouds-color: #AACADF; --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17); }
        .theme-switch, .theme-switch *, .theme-switch *::before, .theme-switch *::after { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; font-size: var(--toggle-size); }
        .theme-switch__container { width: var(--container-width); height: var(--container-height); background-color: var(--container-light-bg); border-radius: var(--container-radius); overflow: hidden; cursor: pointer; transition: var(--transition); position: relative; border: 1px solid rgba(128,128,128,0.2); }
        .theme-switch__container::before { content: ""; position: absolute; z-index: 1; inset: 0; box-shadow: 0em 0.05em 0.187em rgba(0, 0, 0, 0.25) inset, 0em 0.05em 0.187em rgba(0, 0, 0, 0.25) inset; border-radius: var(--container-radius) }
        .theme-switch__checkbox { display: none; }
        .theme-switch__circle-container { width: var(--circle-container-diameter); height: var(--circle-container-diameter); background-color: rgba(255, 255, 255, 0.1); position: absolute; left: var(--circle-container-offset); top: var(--circle-container-offset); border-radius: var(--container-radius); box-shadow: inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), 0 0 0 0.625em rgba(255, 255, 255, 0.1), 0 0 0 1.25em rgba(255, 255, 255, 0.1); display: flex; transition: var(--circle-transition); pointer-events: none; }
        .theme-switch__sun-moon-container { pointer-events: auto; position: relative; z-index: 2; width: var(--sun-moon-diameter); height: var(--sun-moon-diameter); margin: auto; border-radius: var(--container-radius); background-color: var(--sun-bg); box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset; filter: drop-shadow(0.062em 0.125em 0.125em rgba(0, 0, 0, 0.25)) drop-shadow(0em 0.062em 0.125em rgba(0, 0, 0, 0.25)); overflow: hidden; transition: var(--transition); }
        .theme-switch__moon { transform: translateX(100%); width: 100%; height: 100%; background-color: var(--moon-bg); border-radius: inherit; box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #969696 inset; transition: var(--transition); position: relative; }
        .theme-switch__spot { position: absolute; top: 0.75em; left: 0.312em; width: 0.75em; height: 0.75em; border-radius: var(--container-radius); background-color: var(--spot-color); box-shadow: 0em 0.0312em 0.062em rgba(0, 0, 0, 0.25) inset; }
        .theme-switch__spot:nth-of-type(2) { width: 0.375em; height: 0.375em; top: 0.937em; left: 1.375em; }
        .theme-switch__spot:nth-last-of-type(3) { width: 0.25em; height: 0.25em; top: 0.312em; left: 0.812em; }
        .theme-switch__clouds { width: 1.25em; height: 1.25em; background-color: var(--clouds-color); border-radius: var(--container-radius); position: absolute; bottom: -0.625em; left: 0.312em; box-shadow: 0.937em 0.312em var(--clouds-color), -0.312em -0.312em var(--back-clouds-color), 1.437em 0.375em var(--clouds-color), 0.5em -0.125em var(--back-clouds-color), 2.187em 0 var(--clouds-color), 1.25em -0.062em var(--back-clouds-color), 2.937em 0.312em var(--clouds-color), 2em -0.312em var(--back-clouds-color), 3.625em -0.062em var(--clouds-color), 2.625em 0em var(--back-clouds-color), 4.5em -0.312em var(--clouds-color), 3.375em -0.437em var(--back-clouds-color), 4.625em -1.75em 0 0.437em var(--clouds-color), 4em -0.625em var(--back-clouds-color), 4.125em -2.125em 0 0.437em var(--back-clouds-color); transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25); }
        .theme-switch__stars-container { position: absolute; color: var(--stars-color); top: -100%; left: 0.312em; width: 2.75em; height: auto; transition: var(--transition); }
        .theme-switch__checkbox:checked + .theme-switch__container { background-color: var(--container-night-bg); }
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container { left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter)); }
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover { left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em) }
        .theme-switch__circle-container:hover { left: calc(var(--circle-container-offset) + 0.187em); }
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon { transform: translate(0); }
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds { bottom: -4.062em; }
        .theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container { top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 relative">

    <!-- BAKGRUNDSLAGER -->
    <div id="bg-layer"></div>
    <canvas id="starfall"></canvas>
    <div class="blueprint-grid"></div>
    <div class="nebula-glow"></div>

    <!-- HEADER / CONTROLS -->
    <div class="absolute top-6 right-6 z-20">
        <label class="theme-switch">
            <input type="checkbox" class="theme-switch__checkbox" id="theme-switch-input" checked>
            <div class="theme-switch__container">
                <div class="theme-switch__clouds"></div>
                <div class="theme-switch__stars-container">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                        <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="theme-switch__circle-container">
                    <div class="theme-switch__sun-moon-container">
                        <div class="theme-switch__moon">
                            <div class="theme-switch__spot"></div>
                            <div class="theme-switch__spot"></div>
                            <div class="theme-switch__spot"></div>
                        </div>
                    </div>
                </div>
            </div>
        </label>
    </div>

    <div class="glass-panel p-8 md:p-12 max-w-lg w-full text-center relative z-10 mt-10">
        <!-- Logo Text (H1 Nu) -->
        <div class="mb-10 flex flex-col items-center justify-center">
            <h1 class="text-4xl md:text-5xl font-serif text-[var(--text-primary)] tracking-tight transition-colors">SKEPPA.NU</h1>
        </div>

        <!-- Status -->
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded border border-[var(--chalk-line)] bg-white/5 mb-8 backdrop-blur-sm transition-colors cursor-default" style="border-color: var(--chalk-line);">
            <span class="relative flex h-1.5 w-1.5">
                <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-[var(--accent)]"></span>
            </span>
            <span class="text-[10px] font-mono uppercase tracking-widest text-[var(--text-secondary)]">
                Öppnar Februari 2026
            </span>
        </div>

        <!-- COPY -->
        <p class="text-[var(--text-secondary)] text-base mb-8 leading-relaxed transition-colors max-w-md mx-auto">
            Börja skeppa kod med andra utvecklare. Ett nytt tema varje månad. Vi bygger med AI, skeppar live och samlar poäng.
        </p>

        <!-- Waitlist Form -->
        <form id="waitlist-form" class="flex flex-col gap-4">
            <input type="email" id="email" placeholder="din@email.se" class="w-full bg-transparent p-3 text-[var(--text-primary)] text-center focus:outline-none transition-colors placeholder-gray-500" required>
            
            <button type="submit" id="submit-btn" class="btn-submit">
                <svg id="loading-spinner" class="animate-spin -ml-1 mr-2 h-4 w-4 text-current hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="btn-text">JAG ÄR MED</span>
            </button>
            
            <!-- Status message -->
            <div id="form-status" class="status-message" aria-live="polite"></div>
        </form>
        
        <!-- LIVE COUNT INDICATOR -->
        <div class="mt-8 flex items-center justify-center gap-2 text-xs text-[var(--text-secondary)] opacity-70 font-mono tracking-wide mb-2">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-50"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span id="live-count">Räknar skeppare...</span>
        </div>

        <!-- DISKRET BRANDING TAG -->
        <div class="absolute bottom-3 right-4 flex items-center gap-1.5 opacity-40 hover:opacity-100 transition-opacity cursor-help select-none">
            <span class="text-[8px] uppercase tracking-widest text-[var(--text-secondary)]">DRIVS AV</span>
            <img src="https://raw.githubusercontent.com/GusHem/Logga-utan-text/refs/heads/main/Final%20logo%20no%20text.svg" alt="NordSym Logo" class="h-3 w-3">
            <span class="text-[8px] font-bold text-[var(--text-primary)] tracking-widest">NORDSYM AB</span>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = 'https://qjouribmhkkhqdsieprs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UBSBWhsFeqVDFByq13yXNw_NkJGtR_d';
        
        // Initialize client
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- DOM ELEMENTS ---
        const liveCountDisplay = document.getElementById('live-count');
        const waitlistForm = document.getElementById('waitlist-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const emailInput = document.getElementById('email');
        const statusMessage = document.getElementById('form-status');

        // --- LIVE COUNT LOGIC ---
        async function updateWaitlistCount() {
            try {
                // Notera: Räknaren läser fortfarande från 'waitlist' för att undvika komplexitet med Auth-räkning för publika användare.
                // Vi dubbellagrar datan nedan för att lösa detta.
                const { count, error } = await supabaseClient
                    .from('waitlist')
                    .select('*', { count: 'exact', head: true });

                if (error) throw error;
                liveCountDisplay.innerText = `${count || 0} skeppare ombord`;
            } catch (err) {
                console.error("Kunde inte hämta antal:", err);
                liveCountDisplay.innerText = "Letar skeppare..."; 
            }
        }
        
        updateWaitlistCount();

        // --- FORM SUBMISSION LOGIC ---
        waitlistForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email) return;

            setLoading(true);
            statusMessage.innerText = "";
            statusMessage.className = "status-message";

            try {
                // 1. Skapa kontot i Supabase Auth (Detta triggar "Confirm Signup"-mejlet)
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: crypto.randomUUID(), // Slumpat lösenord då vi bara vill åt mejlet/kontot
                });

                if (authError) {
                   if (authError.message.includes("already registered")) {
                       showStatus("Du är redan registrerad! (Kolla skräpposten)", "error");
                   } else {
                       throw authError;
                   }
                   setLoading(false);
                   return;
                }

                // 2. Lägg OCKSÅ till i 'waitlist' för att räknaren ska fungera publikt
                // Vi ignorerar errors här ifall Auth lyckades men Insert failade (t.ex. dubblett)
                await supabaseClient.from('waitlist').insert({ email: email });

                // SUCCESS
                showStatus("Välkommen ombord! Bekräftelse kommer på mejl.", "success");
                emailInput.value = "";
                updateWaitlistCount();

            } catch (err) {
                console.error("Signup error:", err);
                showStatus("Något gick fel. Försök igen.", "error");
            } finally {
                setLoading(false);
            }
        });

        // --- UI HELPERS ---
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                loadingSpinner.classList.remove('hidden');
                btnText.innerText = "Registrerar...";
            } else {
                loadingSpinner.classList.add('hidden');
                btnText.innerText = "JAG ÄR MED";
            }
        }

        function showStatus(msg, type) {
            statusMessage.innerText = msg;
            statusMessage.classList.remove('status-error', 'status-success');
            if (type === 'error') statusMessage.classList.add('status-error');
            if (type === 'success') statusMessage.classList.add('status-success');
        }

        // --- THEME SWITCH LOGIC ---
        const themeCheckbox = document.getElementById('theme-switch-input');
        const body = document.body;

        themeCheckbox.addEventListener('change', () => {
            if (themeCheckbox.checked) {
                body.classList.remove('light-theme'); // Natt
            } else {
                body.classList.add('light-theme'); // Dag
            }
        });

        // --- VISUALS: STARFALL ---
        const canvas = document.getElementById('starfall');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function initStars() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array(150).fill().map(() => ({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5,
                opacity: Math.random()
            }));
        }

        function animateStars() {
            if (body.classList.contains('light-theme')) {
                ctx.clearRect(0, 0, width, height);
                requestAnimationFrame(animateStars);
                return;
            }
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.opacity += (Math.random() - 0.5) * 0.05;
                if (star.opacity < 0) star.opacity = 0;
                if (star.opacity > 1) star.opacity = 1;
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animateStars();
    </script>
</body>
</html>
